#设置改变配置自动启动 [window]的需要重启
# live_config_reload = true

#改变窗口设置
[window]
#窗口大小
dimensions = { columns = 135, lines = 30 }
padding = { x = 4, y = 2 }
dynamic_padding = true
#透明度
opacity = 0.95
#窗口名字
title = "Alacritty"

#字体
[font]
normal = { family = "FiraCode Nerd Font", style = "Regular" }
bold = { family = "FiraCode Nerd Font", style = "Bold" }
italic = { family = "FiraCode Nerd Font", style = "italic" }
size = 12.0

#光标
[cursor]
style = { shape = "Beam", blinking = "On" }

[terminal]
#设定复制黏贴行为 默认只能复制
osc52 = "CopyPaste"

# [shell]
# program = "zsh"
# args = ["-l", "-i", "-c", "zellij attach --index 0 --create"]
# program = "/usr/bin/zsh"
# args = ["-l", "-c", "zellij attach --index 0 --create"]
[keyboard]
bindings = [
    { key = "C", mods = "Control", action = "Copy" },
    { key = "V", mods = "Control", action = "Paste" },
    # ALT + C -> interrupt (Ctrl+C)
    { key = "C", mods = "Alt", mode = "Vi" , chars = "\u0003" },
    # ========== Option + 方向键：按词移动（Unicode 控制序列） ==========
    # Opt+Left  = ESC+b → U+001B + U+0062
    { key = "Left",  mods = "Alt", chars = "\u001B\u0062" },
    # Opt+Right = ESC+f → U+001B + U+0066
    { key = "Right", mods = "Alt", chars = "\u001B\u0066" },

    # ========== Command + 方向键：行首 / 行尾（Unicode 控制字符） ==========
    # Cmd+Left  = SOH (U+0001) → 行首
    { key = "Left",  mods = "Command", chars = "\u0001" },
    # Cmd+Right = ENQ (U+0005) → 行尾
    { key = "Right", mods = "Command", chars = "\u0005" },

    # ========== Mac 删除功能（纯 Unicode） ==========
    # Fn+Delete = 向后删除字符 → ESC[3~ → U+001B+U+005B+U+0033+U+007E
    { key = "Delete", chars = "\u001B\u005B\u0033\u007E" },
    # Opt+Backspace = 删除前一个单词 → ESC+DEL → U+001B+U+007F
    { key = "Back", mods = "Alt", chars = "\u001B\u007F" },
]
